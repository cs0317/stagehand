title: ""
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Ask the community a question about using Stagehand. Before posting, please check the [documentation](https://docs.stagehand.dev/) and search existing discussions.
  - type: textarea
    id: question
    attributes:
      label: Question
      description: Clearly describe your question.
      placeholder: What are you trying to accomplish?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Provide any relevant context, code snippets, or what you have tried.
      placeholder: |
        ```typescript
        import { Stagehand } from "@browserbasehq/stagehand";
        // Your code here
        ```
    validations:
      required: false
  - type: dropdown
    id: sdk
    attributes:
      label: SDK / Language
      description: Which Stagehand SDK are you using?
      options:
        - TypeScript
        - Python
        - MCP
        - Other
    validations:
      required: false
